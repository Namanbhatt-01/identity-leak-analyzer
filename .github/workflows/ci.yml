name: C++ CI Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Run Unit Tests (Ubuntu)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake

    - name: Configure CMake
      run: cmake -B build -S .

    - name: Compile Library and Binaries
      run: cmake --build build

    - name: Run Automated Test Suite
      run: ./build/leak_analyzer_tests
